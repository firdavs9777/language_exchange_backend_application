name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd /home/language_exchange_backend_application
            echo "==> Pulling latest from main"
            git fetch --all
            git reset --hard origin/main
            echo "==> Verifying package-lock.json exists"
            if [ ! -f package-lock.json ]; then
              echo "ERROR: package-lock.json missing! Running npm install instead..."
              npm install --omit=dev
            else
              echo "==> Installing production deps (clean install)"
              npm ci --omit=dev
            fi
            echo "==> Verifying node_modules exists"
            if [ ! -d node_modules ]; then
              echo "ERROR: node_modules installation failed!"
              exit 1
            fi
            echo "==> Stopping PM2 app gracefully"
            pm2 stop language-app || true
            sleep 2
            echo "==> Restarting PM2 app with updated environment"
            pm2 restart language-app --update-env
            sleep 2
            pm2 save
            echo "==> Checking app status"
            pm2 describe language-app | grep -E "status|uptime|restarts" || true
            echo "==> Deploy complete"
