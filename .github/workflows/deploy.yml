name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          command_timeout: 15m
          script_stop: true
          script: |
            set -eo pipefail
            cd /home/language_exchange_backend_application

            echo "==> Environment"
            node -v || true
            npm -v || true
            echo "-- disk --"; df -h . || true
            echo "-- memory --"; free -m || true

            echo "==> Pulling latest from main"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> Installing production dependencies"
            # Prefer a clean, reproducible install. If 'npm ci' fails (lockfile
            # drift, partial tree, transient registry error) we DON'T abort the
            # deploy — its output is printed above, then we fall back to a fresh
            # 'npm install' so a release is never blocked by npm ci's strictness.
            if [ -f package-lock.json ] && npm ci --omit=dev --no-audit --no-fund; then
              echo "==> npm ci succeeded"
            else
              echo "WARN: npm ci unavailable/failed — falling back to npm install"
              rm -rf node_modules
              npm install --omit=dev --no-audit --no-fund
            fi

            echo "==> Verifying node_modules exists"
            if [ ! -d node_modules ]; then
              echo "ERROR: dependency installation failed!"
              exit 1
            fi

            echo "==> Restarting app via PM2"
            # Restart if already registered; otherwise start it fresh.
            pm2 restart language-app --update-env || pm2 start server.js --name language-app --update-env
            sleep 2
            pm2 save
            echo "==> Checking app status"
            pm2 describe language-app | grep -E "status|uptime|restarts" || true
            echo "==> Deploy complete"
